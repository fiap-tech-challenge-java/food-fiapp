services:
  foodfiapp_postgres:
    image: postgres:latest
    container_name: foodfiapp_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - foodfiapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  foodfiapp_application:
    container_name: foodfiapp_application
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      foodfiapp_postgres:
        condition: service_healthy
    restart: on-failure

volumes:
  foodfiapp_pgdata:
