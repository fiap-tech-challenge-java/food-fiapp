# application.yml (comum a todos os perfis)
server:
  port: 8080
  servlet:
    context-path: /api/v1

app:
  version: 0.0.1

spring:
  application:
    name: foodfiapp
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  # Datasource comum (pode ser sobrescrito por perfil)
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update    # use Flyway para criar/alterar schema
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

#  flyway:
 #   enabled: true
 #   locations: classpath:db/migration
 #   baseline-on-migrate: true
 #   out-of-order: false

  sql:
    init:
      mode: never           # evita rodar schema.sql/data.sql

jwt:
  secret: ${JWT_SECRET}     # defina via env/secret
  expiration-ms: ${JWT_EXPIRATION_MS:604800000}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}
  public:
    endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  bucket:
    name: ${MINIO_BUCKET:menu-items}

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
