server:
  port: 8080
  servlet:
    context-path: /api/v1

app:
  version: 0.0.1

spring:
  profiles:
    active: ${SPRING_PROFILE:local}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://foodfiapp_postgres:5432/foodfiapp}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgrespass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:604800000}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}
  public:
    endpoint: ${MINIO_PUBLIC_ENDPOINT:http://localhost:9000}
  bucket:
    name: ${MINIO_BUCKET:menu-items}
