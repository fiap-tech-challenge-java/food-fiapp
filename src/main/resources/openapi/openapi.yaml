openapi: 3.0.3
info:
  title: Food FiApp
  version: 1.0.0
  description: API para gerenciar usuários (dono de restaurante e cliente), restaurantes e itens de cardápio.
servers:
  - url: http://localhost:8080/api/v1

tags:
  - name: auth
    description: Operações relacionadas a autenticação
  - name: users
    description: Operações relacionadas a usuários
  - name: user-types
    description: Operações relacionadas a tipos de usuários
  - name: addresses
    description: Operações relacionadas a endereços de usuários
  - name: restaurants
    description: Operações relacionadas a restaurantes
  - name: menu-items
    description: Operações relacionadas a itens do cardápio

paths:
  /auth/login:
    post:
      operationId: login
      tags:
        - auth
      summary: Autentica um usuário e retorna um token JWT
      description: >
        Este endpoint permite que um usuário (dono de restaurante ou cliente) realize login no sistema.
        Se as credenciais forem válidas, um JSON Web Token (JWT) será retornado.
        O token deve ser usado no header Authorization das requisições subsequentes no formato:
        Authorization: Bearer {token}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Usuário autenticado com sucesso e token JWT retornado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciais inválidas fornecidas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    get:
      operationId: getUsers
      tags:
        - users
      summary: Lista todos os usuários
      description: Retorna uma lista de todos os usuários cadastrados no sistema. A lista pode ser vazia se não houver usuários.
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
          description: Lista de usuários retornada com sucesso (pode ser vazia).

    post:
      operationId: createUser
      tags:
        - users
      summary: Cria um novo usuário
      description: Cadastra um novo usuário no sistema, podendo ser um dono de restaurante ou um cliente. Um endereço inicial é obrigatório no momento da criação.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Usuário criado com sucesso. Retorna os detalhes do usuário recém-criado, incluindo seu ID.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Dados inválidos fornecidos na requisição.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Conflito - usuário já existe com os dados fornecidos.

  /users/{id}:
    get:
      operationId: getUser
      tags:
        - users
      summary: Busca um usuário pelo ID
      description: Retorna os detalhes de um usuário específico, utilizando seu ID único.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          schema:
            format: uuid
            type: string
          in: path
          required: true
          description: O ID único do usuário a ser buscado.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Usuário encontrado e seus detalhes retornados com sucesso.
        '404':
          description: Usuário não encontrado para o ID fornecido.

    put:
      operationId: updateUser
      tags:
        - users
      summary: Atualiza um usuário existente
      description: Permite a atualização de informações de um usuário existente, como nome e login.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
        required: true
      parameters:
        - name: id
          schema:
            format: uuid
            type: string
          in: path
          required: true
          description: O ID único do usuário a ser atualizado.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Usuário atualizado com sucesso. Retorna os detalhes atualizados do usuário.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Usuário não encontrado para o ID fornecido.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Conflito durante a atualização.

    delete:
      operationId: deleteUser
      tags:
        - users
      security:
        - bearerAuth: []
      summary: Deleta um usuário existente
      description: Remove um usuário do sistema com base no seu ID. Esta é uma exclusão lógica.
      parameters:
        - name: id
          schema:
            format: uuid
            type: string
          in: path
          required: true
          description: O ID único do usuário a ser deletado.
      responses:
        '204':
          description: Usuário deletado com sucesso. Nenhuma resposta de conteúdo.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Usuário não encontrado para o ID fornecido.

  /users/change-password:
    put:
      tags:
        - users
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      responses:
        '204':
          description: Senha trocada com sucesso. Nenhuma resposta de conteúdo.
      operationId: changePassword
      summary: Troca a senha do usuário.
      description: Permite que um usuário altere sua senha de acesso.

  /user-types:
    get:
      operationId: getUserTypes
      tags:
        - user-types
      summary: Lista todos os tipos de usuário
      description: Retorna uma lista de todos os tipos de usuário cadastrados no sistema. A lista pode ser vazia se não houver tipos de usuário.
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserTypeResponse'
          description: Lista de tipos de usuário retornada com sucesso (pode ser vazia).

    post:
      operationId: createUserType
      tags:
        - user-types
      summary: Cria um novo tipo de usuário
      description: Cadastra um novo tipo de usuário no sistema. Apenas administradores podem realizar esta operação.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserTypeRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTypeResponse'
          description: Tipo de usuário criado com sucesso. Retorna os detalhes do tipo de usuário recém-criado.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Dados inválidos fornecidos na requisição.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Tipo de usuário já existe ou conflito de dados.

  /user-types/{uuid}:
    get:
      operationId: getUserType
      tags:
        - user-types
      summary: Busca um tipo de usuário pelo UUID
      description: Retorna os detalhes de um tipo de usuário específico, utilizando seu UUID único.
      security:
        - bearerAuth: []
      parameters:
        - name: uuid
          schema:
            format: uuid
            type: string
          in: path
          required: true
          description: O UUID único do tipo de usuário a ser buscado.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTypeResponse'
          description: Tipo de usuário encontrado e seus detalhes retornados com sucesso.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Tipo de usuário não encontrado para o UUID fornecido.

    put:
      operationId: updateUserType
      tags:
        - user-types
      summary: Atualiza um tipo de usuário existente
      description: Permite a atualização de informações de um tipo de usuário existente. Apenas administradores podem realizar esta operação.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserTypeRequest'
        required: true
      parameters:
        - name: uuid
          schema:
            format: uuid
            type: string
          in: path
          required: true
          description: O UUID único do tipo de usuário a ser atualizado.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTypeResponse'
          description: Tipo de usuário atualizado com sucesso. Retorna os detalhes atualizados do tipo de usuário.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Tipo de usuário não encontrado para o UUID fornecido.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Conflito de dados ao atualizar o tipo de usuário.

    delete:
      operationId: deleteUserType
      tags:
        - user-types
      security:
        - bearerAuth: []
      summary: Deleta um tipo de usuário existente
      description: Remove um tipo de usuário do sistema com base no seu UUID. Esta operação só pode ser realizada por administradores e não é permitida se o tipo de usuário estiver sendo usado por usuários ativos.
      parameters:
        - name: uuid
          schema:
            format: uuid
            type: string
          in: path
          required: true
          description: O UUID único do tipo de usuário a ser deletado.
      responses:
        '204':
          description: Tipo de usuário deletado com sucesso. Nenhuma resposta de conteúdo.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Tipo de usuário não encontrado para o UUID fornecido.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Não é possível deletar o tipo de usuário pois está sendo usado por usuários ativos.
  /users/{userId}/addresses:
    parameters:
      - name: userId
        schema:
          format: uuid
          type: string
        in: path
        required: true
        description: O ID único do usuário.


    get:
      tags:
        - addresses
      security:
        - bearerAuth: []
      operationId: listAddressesByUserId
      summary: Lista todos os endereços de um usuário.
      description: Retorna uma lista de todos os endereços associados a um usuário específico.
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AddressResponse'
          description: Lista com sucesso todos os endereços do usuário. Pode retornar uma lista vazia.

    post:
      tags:
        - addresses
      security:
        - bearerAuth: []
      operationId: createAddressForUser
      summary: Cria um novo endereço para um usuário.
      description: Adiciona um novo endereço à lista de endereços de um usuário existente.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAddressRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'
          description: Cria com sucesso um endereço para o usuário. Retorna os detalhes do endereço recém-criado.

  /users/{userId}/addresses/{addressId}:
    parameters:
      - name: userId
        schema:
          format: uuid
          type: string
        in: path
        required: true
        description: O ID único do usuário proprietário do endereço.
      - name: addressId
        schema:
          format: uuid
          type: string
        in: path
        required: true
        description: O ID único do endereço.


    put:
      tags:
        - addresses
      security:
        - bearerAuth: []
      operationId: updateAddressForUser
      summary: Atualiza um endereço específico de um usuário.
      description: Permite a atualização dos detalhes de um endereço específico associado a um usuário.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAddressRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'
          description: Endereço atualizado com sucesso. Retorna os detalhes atualizados do endereço.
        '404':
          description: Usuário ou endereço não encontrado.

    delete:
      tags:
        - addresses
      security:
        - bearerAuth: []
      operationId: deleteAddressForUser
      summary: Deleta logicamente um endereço de um usuário.
      description: Marca um endereço específico como inativo para um determinado usuário, não o removendo fisicamente do banco de dados.
      responses:
        '204':
          description: Endereço deletado com sucesso. Nenhuma resposta de conteúdo.
        '404':
          description: Usuário ou endereço não encontrado.

  /restaurants:
    get:
      tags:
        - restaurants
      summary: Lista todos os restaurantes
      description: Retorna uma lista de todos os restaurantes cadastrados.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de restaurantes retornada com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RestaurantResponse'
    post:
      tags:
        - restaurants
      summary: Cria um novo restaurante
      description: Cadastra um novo restaurante. Apenas usuários do tipo "Owner" ou "Admin" podem realizar esta operação.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestaurantRequest'
      responses:
        '201':
          description: Restaurante criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantResponse'
        '400':
          description: Dados inválidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Acesso negado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restaurants/{id}:
    get:
      tags:
        - restaurants
      summary: Busca um restaurante pelo ID
      description: Retorna os detalhes de um restaurante específico.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Restaurante encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantResponse'
        '404':
          description: Restaurante não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - restaurants
      summary: Atualiza um restaurante existente
      description: Atualiza os dados de um restaurante. Apenas o "Owner" do restaurante ou um "Admin" pode realizar esta operação.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestaurantRequest'
      responses:
        '200':
          description: Restaurante atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantResponse'
        '403':
          description: Acesso negado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Restaurante não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - restaurants
      summary: Deleta um restaurante
      description: Deleta um restaurante. Apenas o "Owner" do restaurante ou um "Admin" pode realizar esta operação.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Restaurante deletado com sucesso.
        '403':
          description: Acesso negado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Restaurante não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restaurants/{restaurantId}/menu-items:
    get:
      tags:
        - menu-items
      summary: Lista os itens do cardápio de um restaurante
      description: Retorna todos os itens do cardápio de um restaurante específico.
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de itens do cardápio retornada com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuItemResponse'
    post:
      tags:
        - menu-items
      summary: Adiciona um novo item ao cardápio
      description: Adiciona um novo item ao cardápio de um restaurante. Apenas o "Owner" do restaurante ou um "Admin" pode realizar esta operação.
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuItemRequest'
      responses:
        '201':
          description: Item do cardápio criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'
        '403':
          description: Acesso negado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Restaurante não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restaurants/{restaurantId}/menu-items/{itemId}:
    get:
      tags:
        - menu-items
      summary: Busca um item do cardápio pelo ID
      description: Retorna os detalhes de um item específico do cardápio.
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Item do cardápio encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'
        '404':
          description: Item do cardápio não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - menu-items
      summary: Atualiza um item do cardápio
      description: Atualiza os dados de um item do cardápio. Apenas o "Owner" do restaurante ou um "Admin" pode realizar esta operação.
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MenuItemRequest'
      responses:
        '200':
          description: Item do cardápio atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'
        '403':
          description: Acesso negado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item do cardápio não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - menu-items
      summary: Deleta um item do cardápio
      description: Deleta um item do cardápio. Apenas o "Owner" do restaurante ou um "Admin" pode realizar esta operação.
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Item do cardápio deletado com sucesso.
        '403':
          description: Acesso negado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item do cardápio não encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Insira o token JWT obtido do endpoint /auth/login no formato: Bearer {token}

  schemas:
    ErrorResponse:
      title: Resposta de Erro
      required:
        - message
        - code
        - status
        - path
      type: object
      properties:
        message:
          description: Mensagem de erro detalhada.
          type: string
          example: Dados de entrada inválidos.
        code:
          description: Código interno do erro.
          type: string
          example: INVALID_INPUT
        status:
          description: Código de status HTTP.
          type: integer
          example: 400
        path:
          description: URL da requisição que gerou o erro.
          type: string
          example: /api/v1/users
        fieldErrors:
          description: Mapa de erros de validação específicos do campo, onde a chave é o nome do campo e o valor é a mensagem de erro.
          type: object
          additionalProperties:
            type: string
          example:
            email: O formato do e-mail é inválido.
            password: A senha deve ter no mínimo 8 caracteres.

    ChangePasswordRequest:
      title: Solicitação de Mudança de Senha
      description: Estrutura da requisição para alterar a senha de um usuário.
      type: object
      properties:
        id:
          format: uuid
          type: string
          description: O ID único do usuário cuja senha será alterada.
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
        lastPassword:
          type: string
          description: A senha antiga do usuário.
          example: MinhaAntigaSenha123!
        newPassword:
          type: string
          description: A nova senha desejada pelo o usuário.
          example: MinhaNovaSenha123!
        confirmPassword:
          type: string
          description: A confirmação da senha desejada pelo o usuário.
          example: MinhaNovaSenha123!

    UserRole:
      title: Papel do Usuário
      description: Papel do usuário no sistema. Define as permissões e funcionalidades disponíveis.
      enum:
        - OWNER
        - CUSTOMER
        - ADMIN
      type: string


    CreateAddressRequest:
      title: Solicitação de Criação de Endereço
      description: Estrutura da requisição para criar um novo endereço para um usuário.
      type: object
      properties:
        publicPlace:
          type: string
          description: Nome da rua, avenida, praça, etc.
          example: Rua das Flores
        number:
          type: string
          description: Número do imóvel.
          example: '123'
