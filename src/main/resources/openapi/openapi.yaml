      description: Estrutura da resposta do endpoint de login, incluindo informacoes de autenticacao e token
      required:
        - token
        - login
        - email
        - expiresAt
        - expiresIn
        - userId
      type: object
      properties:
        token:
          type: string
          description: Token JWT para autenticacao
          example: eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1c2VyQGV4YW1wbGUuY29tIiwiaWF0IjoxNjg5MjY4MDUwLCJleHAiOjE2ODkyNzA0NTB9.X
        login:
          type: string
          description: Login do usuario
          example: joaosilva123
        email:
          type: string
          description: Email do usuario
          example: joao.silva@example.com
        expiresAt:
          type: string
          format: date-time
          description: Data e hora de expiracao do token
          example: '2025-07-10T23:09:24-03:00'
        expiresIn:
          type: integer
          format: int32
          description: Tempo restante ate a expiracao do token em segundos
          example: 3600
        userId:
          type: string
          format: uuid
          description: ID unico do usuario
          example: 123e4567-e89b-12d3-a456-426614174000

