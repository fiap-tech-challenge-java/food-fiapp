openapi: 3.0.3
info:
  title: Food FiApp
  version: 1.0.0
  description: API para gerenciar usuarios (dono de restaurante e cliente), restaurantes e itens de cardapio.
servers:
  - url: http://localhost:8080/api/v1

tags:
  - name: auth
    description: Operacoes relacionadas a autenticacao
  - name: users
    description: Operacoes relacionadas a usuarios
  - name: user-types
    description: Operacoes relacionadas a tipos de usuarios
  - name: address
    description: Operacoes relacionadas a enderecos de usuarios
  - name: restaurants
    description: Operacoes relacionadas a restaurantes
  - name: menu-items
    description: Operacoes relacionadas a itens do cardapio

paths:
  /auth/login:
    post:
      operationId: login
      tags:
        - auth
      summary: Autentica um usuario e retorna um token JWT
      description: >
        Este endpoint permite que um usuario (dono de restaurante ou cliente) realize login no sistema.
        Se as credenciais forem validas, um JSON Web Token (JWT) sera retornado.
        O token deve ser usado no header Authorization das requisicoes subsequentes no formato:
        Authorization: Bearer {token}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Usuario autenticado com sucesso e token JWT retornado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciais invalidas fornecidas.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    get:
      operationId: getUsers
      tags:
        - users
      summary: Lista todos os usuarios
      description: Retorna uma lista de todos os usuarios cadastrados no sistema. A lista pode ser vazia se nao houver usuarios.
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
          description: Lista de usuarios retornada com sucesso (pode ser vazia).

    post:
      operationId: createUser
      tags:
        - users
      summary: Cria um novo usuario
      description: Cadastra um novo usuario no sistema, podendo ser um dono de restaurante ou um cliente. Um endereco inicial e obrigatorio no momento da criacao.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Usuario criado com sucesso. Retorna os detalhes do usuario recem-criado, incluindo seu ID.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Dados invalidos fornecidos na requisicao.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Conflito - usuario ja existe com os dados fornecidos.

  /users/{id}:
    get:
      operationId: getUser
      tags:
        - users
      summary: Busca um usuario pelo ID
      description: Retorna os detalhes de um usuario especifico, utilizando seu ID unico.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          schema:
            format: uuid
            type: string
          in: path
          required: true
          description: O ID unico do usuario a ser buscado.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Usuario encontrado e seus detalhes retornados com sucesso.
        '404':
          description: Usuario nao encontrado para o ID fornecido.

    put:
      operationId: updateUser
      tags:
        - users
      summary: Atualiza um usuario existente
      description: Permite a atualizacao de informacoes de um usuario existente, como nome e login.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
        required: true
      parameters:
        - name: id
          schema:
            format: uuid
            type: string
          in: path
          required: true
          description: O ID unico do usuario a ser atualizado.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Usuario atualizado com sucesso. Retorna os detalhes atualizados do usuario.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Usuario nao encontrado para o ID fornecido.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Conflito durante a atualizacao.

    delete:
      operationId: deleteUser
      tags:
        - users
      security:
        - bearerAuth: []
      summary: Deleta um usuario existente
      description: Remove um usuario do sistema com base no seu ID. Esta e uma exclusao logica.
      parameters:
        - name: id
          schema:
            format: uuid
            type: string
          in: path
          required: true
          description: O ID unico do usuario a ser deletado.
      responses:
        '204':
          description: Usuario deletado com sucesso. Nenhuma resposta de conteudo.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Usuario nao encontrado para o ID fornecido.

  /users/change-password:
    put:
      tags:
        - users
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
        required: true
      responses:
        '204':
          description: Senha trocada com sucesso. Nenhuma resposta de conteudo.
      operationId: changePassword
      summary: Troca a senha do usuario.
      description: Permite que um usuario altere sua senha de acesso.

  /user-types:
    get:
      operationId: getUserTypes
      tags:
        - user-types
      summary: Lista todos os tipos de usuario
      description: Retorna uma lista de todos os tipos de usuario cadastrados no sistema. A lista pode ser vazia se nao houver tipos de usuario.
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserTypeResponse'
          description: Lista de tipos de usuario retornada com sucesso (pode ser vazia).

    post:
      operationId: createUserType
      tags:
        - user-types
      summary: Cria um novo tipo de usuario
      description: Cadastra um novo tipo de usuario no sistema. Apenas administradores podem realizar esta operacao.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserTypeRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTypeResponse'
          description: Tipo de usuario criado com sucesso. Retorna os detalhes do tipo de usuario recem-criado.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Dados invalidos fornecidos na requisicao.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Tipo de usuario ja existe ou conflito de dados.

  /user-types/{uuid}:
    get:
      operationId: getUserType
      tags:
        - user-types
      summary: Busca um tipo de usuario pelo UUID
      description: Retorna os detalhes de um tipo de usuario especifico, utilizando seu UUID unico.
      security:
        - bearerAuth: []
      parameters:
        - name: uuid
          schema:
            format: uuid
            type: string
          in: path
          required: true
          description: O UUID unico do tipo de usuario a ser buscado.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTypeResponse'
          description: Tipo de usuario encontrado e seus detalhes retornados com sucesso.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Tipo de usuario nao encontrado para o UUID fornecido.

    put:
      operationId: updateUserType
      tags:
        - user-types
      summary: Atualiza um tipo de usuario existente
      description: Permite a atualizacao de informacoes de um tipo de usuario existente. Apenas administradores podem realizar esta operacao.
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserTypeRequest'
        required: true
      parameters:
        - name: uuid
          schema:
            format: uuid
            type: string
          in: path
          required: true
          description: O UUID unico do tipo de usuario a ser atualizado.
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserTypeResponse'
          description: Tipo de usuario atualizado com sucesso. Retorna os detalhes atualizados do tipo de usuario.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Tipo de usuario nao encontrado para o UUID fornecido.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Conflito de dados ao atualizar o tipo de usuario.

    delete:
      operationId: deleteUserType
      tags:
        - user-types
      security:
        - bearerAuth: []
      summary: Deleta um tipo de usuario existente
      description: Remove um tipo de usuario do sistema com base no seu UUID. Esta operacao so pode ser realizada por administradores e nao e permitida se o tipo de usuario estiver sendo usado por usuarios ativos.
      parameters:
        - name: uuid
          schema:
            format: uuid
            type: string
          in: path
          required: true
          description: O UUID unico do tipo de usuario a ser deletado.
      responses:
        '204':
          description: Tipo de usuario deletado com sucesso. Nenhuma resposta de conteudo.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Tipo de usuario nao encontrado para o UUID fornecido.
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Nao e possivel deletar o tipo de usuario pois esta sendo usado por usuarios ativos.
  /users/{userId}/address:
    parameters:
      - name: userId
        schema:
          format: uuid
          type: string
        in: path
        required: true
        description: O ID unico do usuario.


    get:
      tags:
        - address
      security:
        - bearerAuth: []
      operationId: listAddressByUserId
      summary: Lista todos os enderecos de um usuario.
      description: Retorna uma lista de todos os enderecos associados a um usuario especifico.
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AddressResponse'
          description: Lista com sucesso todos os enderecos do usuario. Pode retornar uma lista vazia.

    post:
      tags:
        - address
      security:
        - bearerAuth: []
      operationId: createAddressForUser
      summary: Cria um novo endereco para um usuario.
      description: Adiciona um novo endereco a lista de enderecos de um usuario existente.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAddressRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'
          description: Cria com sucesso um endereco para o usuario. Retorna os detalhes do endereco recem-criado.

  /users/{userId}/address/{addressId}:
    parameters:
      - name: userId
        schema:
          format: uuid
          type: string
        in: path
        required: true
        description: O ID unico do usuario proprietario do endereco.
      - name: addressId
        schema:
          format: uuid
          type: string
        in: path
        required: true
        description: O ID unico do endereco.


    put:
      tags:
        - address
      security:
        - bearerAuth: []
      operationId: updateAddressForUser
      summary: Atualiza um endereco especifico de um usuario.
      description: Permite a atualizacao dos detalhes de um endereco especifico associado a um usuario.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAddressRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressResponse'
          description: Endereco atualizado com sucesso. Retorna os detalhes atualizados do endereco.
        '404':
          description: Usuario ou endereco nao encontrado.

    delete:
      tags:
        - address
      security:
        - bearerAuth: []
      operationId: deleteAddressForUser
      summary: Deleta logicamente um endereco de um usuario.
      description: Marca um endereco especifico como inativo para um determinado usuario, nao o removendo fisicamente do banco de dados.
      responses:
        '204':
          description: Endereco deletado com sucesso. Nenhuma resposta de conteudo.
        '404':
          description: Usuario ou endereco nao encontrado.

  /restaurants:
    get:
      tags:
        - restaurants
      summary: Lista todos os restaurantes
      description: Retorna uma lista de todos os restaurantes cadastrados.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de restaurantes retornada com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RestaurantResponse'
    post:
      tags:
        - restaurants
      summary: Cria um novo restaurante
      description: Cadastra um novo restaurante. Apenas usuarios do tipo "Owner" ou "Admin" podem realizar esta operacao.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRestaurantRequest'
      responses:
        '201':
          description: Restaurante criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantResponse'
        '400':
          description: Dados invalidos.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Acesso negado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restaurants/{id}:
    get:
      tags:
        - restaurants
      summary: Busca um restaurante pelo ID
      description: Retorna os detalhes de um restaurante especifico.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Restaurante encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantResponse'
        '404':
          description: Restaurante nao encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
        - restaurants
      summary: Atualiza um restaurante existente
      description: Atualiza os dados de um restaurante. Apenas o "Owner" do restaurante ou um "Admin" pode realizar esta operacao.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRestaurantRequest'
      responses:
        '200':
          description: Restaurante atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestaurantResponse'
        '403':
          description: Acesso negado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Restaurante nao encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - restaurants
      summary: Deleta um restaurante
      description: Deleta um restaurante. Apenas o "Owner" do restaurante ou um "Admin" pode realizar esta operacao.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Restaurante deletado com sucesso.
        '403':
          description: Acesso negado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Restaurante nao encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /restaurants/{restaurantId}/menu-items:
    get:
      operationId: listMenuItems
      tags:
        - menu-items
      summary: Lista os itens do cardapio de um restaurante
      description: Retorna todos os itens do cardapio de um restaurante especifico.
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Lista de itens do cardapio retornada com sucesso.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MenuItemResponse'
    post:
      operationId: createMenuItem
      tags:
        - menu-items
      summary: Adiciona um novo item ao cardapio
      description: Adiciona um novo item ao cardapio de um restaurante. Apenas o "Owner" do restaurante ou um "Admin" pode realizar esta operacao.
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Nome do item do cardapio
                description:
                  type: string
                  description: Descricao do item
                price:
                  type: number
                  format: double
                  description: Preco do item
                availableForInStoreOnly:
                  type: boolean
                  description: Disponivel apenas para consumo no local
                photo:
                  type: string
                  format: binary
                  description: Arquivo de imagem do item
      responses:
        '201':
          description: Item do cardapio criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'

  /restaurants/{restaurantId}/menu-items/{itemId}:
    get:
      operationId: getMenuItem
      tags:
        - menu-items
      summary: Busca um item do cardapio pelo ID
      description: Retorna os detalhes de um item especifico do cardapio.
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Item do cardapio encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'
        '404':
          description: Item do cardapio nao encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateMenuItem
      tags:
        - menu-items
      summary: Atualiza um item do cardapio
      description: Atualiza os dados de um item do cardapio. Apenas o "Owner" do restaurante ou um "Admin" pode realizar esta operacao.
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Nome do item do cardapio
                description:
                  type: string
                  description: Descricao do item
                price:
                  type: number
                  format: double
                  description: Preco do item
                availableForInStoreOnly:
                  type: boolean
                  description: Disponivel apenas para consumo no local
                photo:
                  type: string
                  format: binary
                  description: Arquivo de imagem do item
      responses:
        '200':
          description: Item do cardapio atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuItemResponse'
        '403':
          description: Acesso negado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item do cardapio nao encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteMenuItem
      tags:
        - menu-items
      summary: Remove um item do cardapio
      description: Remove um item do cardapio. Apenas o "Owner" do restaurante ou um "Admin" pode realizar esta operacao.
      security:
        - bearerAuth: []
      parameters:
        - name: restaurantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Item do cardapio removido com sucesso.
        '403':
          description: Acesso negado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item do cardapio nao encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Insira o token JWT obtido do endpoint /auth/login no formato: Bearer {token}

  schemas:
    ErrorResponse:
      title: Resposta de Erro
      required:
        - message
        - code
        - status
        - path
        - timestamp
      type: object
      properties:
        message:
          description: Mensagem de erro detalhada.
          type: string
          example: Dados de entrada invalidos.
        code:
          description: Codigo interno do erro.
          type: string
          example: INVALID_INPUT
        status:
          description: Codigo de status HTTP.
          type: integer
          example: 400
        path:
          description: URL da requisicao que gerou o erro.
          type: string
          example: /api/v1/users
        timestamp:
          description: Data e hora quando o erro ocorreu.
          type: string
          format: date-time
          example: '2025-09-23T22:30:00-03:00'
        fieldErrors:
          description: Mapa de erros de validacao especificos do campo, onde a chave e o nome do campo e o valor e a mensagem de erro.
          type: object
          additionalProperties:
            type: string
          example:
            email: O formato do e-mail e invalido.
            password: A senha deve ter no minimo 8 caracteres.

    ChangePasswordRequest:
      title: Solicitacao de Mudanca de Senha
      description: Estrutura da requisicao para alterar a senha de um usuario.
      type: object
      properties:
        id:
          format: uuid
          type: string
          description: O ID unico do usuario cuja senha sera alterada.
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
        lastPassword:
          type: string
          description: A senha antiga do usuario.
          example: MinhaAntigaSenha123!
        newPassword:
          type: string
          description: A nova senha desejada pelo o usuario.
